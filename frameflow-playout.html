<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FRAMEFLOW — PLAYOUT</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400&family=Barlow:wght@300;400;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
:root{--accent:#d4ff47;--accent2:#ff6b35;}
body{background:#000;overflow:hidden;width:100vw;height:100vh;cursor:none;}
#stage{position:relative;overflow:hidden;background:#000;width:100vw;height:100vh;}
.play-layer{position:absolute;inset:0;}
#fade-overlay{position:absolute;inset:0;background:#000;opacity:0;z-index:50;pointer-events:none;transition:none;}

.kb-layer{position:absolute;inset:0;will-change:transform;transform-origin:50% 50%;}
.kb-layer img.fill{width:100%;height:100%;object-fit:cover;}
.blur-bg{position:absolute;inset:-30px;background-size:cover;background-position:center;filter:blur(28px) brightness(0.45);transform:scale(1.15);}
.blur-fg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
.blur-fg img{max-width:100%;max-height:100%;object-fit:contain;box-shadow:0 10px 50px rgba(0,0,0,0.7);}
.split-bg-layer{position:absolute;inset:0;background-size:cover;background-position:center;filter:blur(22px) brightness(0.35) saturate(1.4);}
.split-content{position:absolute;inset:0;display:flex;align-items:center;padding:5%;}
.split-content--full{padding:0;}
.split-content--photo-right{flex-direction:row-reverse;}
.split-content--photo-center{flex-direction:column;justify-content:flex-start;align-items:center;padding-top:10%;}
.split-content--photo-center .split-img-wrap--center{flex-shrink:0;min-height:0;}
.split-content--photo-center .split-text{position:absolute;left:0;right:0;width:100%;top:calc(10% + var(--split-center-img-h, 45%));bottom:0;display:flex;flex-direction:column;justify-content:flex-end;padding:0 5% 5%;overflow:visible;z-index:2;container-type:size;}
.split-content--photo-center .split-text .split-text-inner{overflow:visible;}
.split-img-wrap{width:55%;height:85%;flex-shrink:0;overflow:hidden;}
.split-img-wrap--full{position:absolute;inset:0;width:100%;height:100%;}
.split-img-wrap img{width:100%;height:100%;}
.split-text{padding:0 5%;color:#fff;flex:1;display:flex;flex-direction:column;min-width:0;container-type:inline-size;container-name:split-text;}
.split-text-inner{width:100%;max-width:100%;overflow:hidden;}
.split-text--h-left{align-items:flex-start;text-align:left;}
.split-text--h-left .split-text-inner{text-align:left;}
.split-text--h-center{align-items:center;text-align:center;}
.split-text--h-center .split-text-inner{text-align:center;}
.split-text--h-right{align-items:flex-end;text-align:right;}
.split-text--h-right .split-text-inner{text-align:right;}
.split-tag{font-family:'DM Mono';font-size:clamp(8px,2cqi,12px);letter-spacing:3px;text-transform:uppercase;margin-bottom:4px;}
.split-text h2{font-family:'Bebas Neue';font-size:clamp(11px,6cqi,38px);letter-spacing:2px;line-height:1.05;margin-bottom:6px;word-break:break-word;}
.split-text p{font-size:clamp(8px,4cqi,14px);font-weight:300;line-height:1.6;word-break:break-word;opacity:0.9;}
@supports (font-size:1cqh){.split-content--photo-center .split-text .split-tag{font-size:clamp(7px,min(2.5cqi,2.8cqh),12px);}.split-content--photo-center .split-text h2{font-size:clamp(10px,min(6cqi,6cqh),32px);}.split-content--photo-center .split-text p{font-size:clamp(7px,min(4cqi,3.5cqh),14px);}.split-content--photo-center .split-text--center-lines-1 .split-tag{font-size:clamp(8px,min(3cqi,3.5cqh),12px);}.split-content--photo-center .split-text--center-lines-1 h2{font-size:clamp(14px,min(8cqi,9cqh),42px);}.split-content--photo-center .split-text--center-lines-1 p{font-size:clamp(8px,min(4.5cqi,4cqh),14px);}.split-content--photo-center .split-text--center-lines-2 .split-tag{font-size:clamp(7px,min(2.8cqi,3cqh),12px);}.split-content--photo-center .split-text--center-lines-2 h2{font-size:clamp(12px,min(7cqi,7cqh),36px);}.split-content--photo-center .split-text--center-lines-2 p{font-size:clamp(7px,min(4cqi,3.8cqh),14px);}.split-content--photo-center .split-text--center-lines-3 .split-tag{font-size:clamp(6px,min(2.2cqi,2.2cqh),11px);}.split-content--photo-center .split-text--center-lines-3 h2{font-size:clamp(9px,min(5cqi,4.5cqh),28px);}.split-content--photo-center .split-text--center-lines-3 p{font-size:clamp(6px,min(3.5cqi,3cqh),12px);}}
.vignette{position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 35%,rgba(0,0,0,0.65) 100%);pointer-events:none;}

.lower-third{
  position:absolute;left:0;right:0;
  display:flex;flex-direction:column;
  padding:clamp(16px,3vw,36px) clamp(20px,3.5vw,48px) clamp(12px,2vw,28px);
  transform:translateY(100%);
  transition:transform 0.55s cubic-bezier(0.16,1,0.3,1),bottom 0.25s ease;
}
.lower-third.pos-bottom{bottom:0;}
.lower-third.vis{transform:translateY(0);}
.lower-third-inner{display:block;}
.lower-third.lt-justify-left .lower-third-inner{text-align:left;}
.lower-third.lt-justify-center .lower-third-inner{text-align:center;}
.lower-third.lt-justify-right .lower-third-inner{text-align:right;}
.lt-tag{font-family:'DM Mono';font-size:clamp(8px,1vw,14px);letter-spacing:4px;text-transform:uppercase;margin-bottom:4px;}
.lt-title{font-family:'Bebas Neue';font-size:clamp(24px,5vw,72px);letter-spacing:2px;line-height:1.05;}
.lt-sub{font-size:clamp(11px,1.4vw,20px);opacity:0.8;margin-top:4px;font-weight:300;line-height:1.5;}

.prog-bar{position:absolute;bottom:0;left:0;right:0;height:4px;background:rgba(255,255,255,0.08);}
.prog-fill{height:100%;background:var(--accent);width:0%;}

#idle-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:#000;z-index:100;}
#idle-overlay .logo{font-family:'Bebas Neue';font-size:clamp(28px,4vw,56px);letter-spacing:8px;color:var(--accent);}
#idle-overlay .sub{font-family:'DM Mono';font-size:clamp(10px,1.2vw,14px);letter-spacing:4px;color:#333;}
#idle-overlay .hint{font-family:'DM Mono';font-size:11px;color:#222;letter-spacing:2px;}
#idle-overlay .dot-pulse{display:flex;gap:8px;}
#idle-overlay .dot{width:8px;height:8px;border-radius:50%;background:#222;animation:dp 1.4s ease-in-out infinite;}
#idle-overlay .dot:nth-child(2){animation-delay:0.2s;}
#idle-overlay .dot:nth-child(3){animation-delay:0.4s;}
@keyframes dp{0%,80%,100%{transform:scale(0.6);background:#222;}40%{transform:scale(1);background:#d4ff47;}}

@keyframes kb-zi{from{transform:scale(1) translate(0,0)}to{transform:scale(var(--ks,1.12)) translate(-2.5%,-2.5%)}}
@keyframes kb-zo{from{transform:scale(var(--ks,1.12)) translate(-2.5%,-2.5%)}to{transform:scale(1) translate(0,0)}}
@keyframes kb-pr{from{transform:scale(var(--ks,1.12)) translate(-3%,0)}to{transform:scale(var(--ks,1.12)) translate(3%,0)}}
@keyframes kb-pl{from{transform:scale(var(--ks,1.12)) translate(3%,0)}to{transform:scale(var(--ks,1.12)) translate(-3%,0)}}
@keyframes kb-dr{from{transform:scale(1.05) translate(-2%,-1.5%)}to{transform:scale(var(--ks,1.12)) translate(2%,1.5%)}}
@keyframes fadeInAnim{from{opacity:0}to{opacity:1}}
@keyframes fadeOutAnim{from{opacity:1}to{opacity:0}}
@keyframes wipeIn{from{clip-path:inset(0 100% 0 0)}to{clip-path:inset(0 0% 0 0)}}
@keyframes crossZoomIn{from{transform:scale(1.08);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes crossZoomOut{from{transform:scale(1);opacity:1}to{transform:scale(0.95);opacity:0}}
@keyframes dipIn{0%{opacity:0}100%{opacity:1}}
@keyframes dipOut{0%{opacity:1}50%{opacity:0}100%{opacity:0}}
.trans-fade-in{animation:fadeInAnim var(--td,0.8s) ease forwards;}
.trans-fade-out{animation:fadeOutAnim var(--td,0.8s) ease forwards;}
.trans-wipe-in{animation:wipeIn var(--td,0.8s) ease forwards;}
.trans-czoom-in{animation:crossZoomIn var(--td,0.8s) ease forwards;}
.trans-czoom-out{animation:crossZoomOut var(--td,0.8s) ease forwards;}
.trans-dip-in{animation:dipIn var(--td,0.8s) ease forwards;animation-delay:calc(var(--td,0.8s)/2);opacity:0;}
.trans-dip-out{animation:dipOut var(--td,0.8s) ease forwards;}

#conn-dot{position:fixed;bottom:10px;right:12px;width:6px;height:6px;border-radius:50%;background:#1a1a1a;z-index:999;}
#conn-dot.live{background:var(--accent);}
</style>
</head>
<body>
<div id="stage">
  <div id="idle-overlay">
    <div class="logo">FRAMEFLOW</div>
    <div class="sub">PLAYOUT READY</div>
    <div class="hint">Waiting for controller...</div>
    <div class="dot-pulse"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
  </div>
  <div id="fade-overlay"></div>
</div>
<div id="conn-dot"></div>

<script>
const stage = document.getElementById('stage');
const idle = document.getElementById('idle-overlay');
const fadeOverlay = document.getElementById('fade-overlay');
const connDot = document.getElementById('conn-dot');
let progRAF, fadeTimer;

const channel = new BroadcastChannel('frameflow_playout_v1');
channel.onmessage = e => handleMsg(e.data);
window.addEventListener('message', e => handleMsg(e.data));

function handleMsg(d) {
  if (d.type === 'play')   { connDot.classList.add('live'); renderFrame(d); }
  if (d.type === 'stop')   { stop(); }
  if (d.type === 'fadeOut'){ doFadeOut(d.duration || 1, d.partial); }
  if (d.type === 'fadeIn') { doFadeIn(d.duration || 1); }
  if (d.type === 'ping')   { connDot.classList.add('live'); channel.postMessage({ type:'pong' }); }
}

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function xyz2css(cx, cy, z, zoomScaleMult) {
  const mult = zoomScaleMult == null ? 1 : Number(zoomScaleMult);
  const effectiveZ = Math.max(0.5, Math.min(10, z * mult));
  const tx = effectiveZ <= 1 ? 0 : 50 - cx;
  const ty = effectiveZ <= 1 ? 0 : 50 - cy;
  return `translate(${tx.toFixed(3)}%, ${ty.toFixed(3)}%) scale(${effectiveZ.toFixed(4)})`;
}
function applyCustomKB(kbEl, start, end, dur, zoomScaleMult) {
  const pt2css = pt => {
    const cx = pt.x + pt.w / 2, cy = pt.y + pt.h / 2;
    const z = Math.max(1, 100 / Math.max(pt.w, pt.h));
    return xyz2css(cx, cy, z, zoomScaleMult);
  };
  const c = (window._kbC = (window._kbC || 0) + 1), name = `kbC${c}`;
  const s = document.createElement('style');
  s.textContent = `@keyframes ${name}{from{transform:${pt2css(start)}}to{transform:${pt2css(end)}}}`;
  document.head.appendChild(s);
  kbEl.style.transformOrigin = '50% 50%';
  kbEl.style.animation = `${name} ${dur}s linear forwards`;
}
function applyCustomKBFromXYZ(kbEl, startCx, startCy, startZ, endCx, endCy, endZ, dur, zoomScaleMult) {
  const fromCss = xyz2css(startCx, startCy, startZ, zoomScaleMult);
  const toCss = xyz2css(endCx, endCy, endZ, zoomScaleMult);
  const c = (window._kbC = (window._kbC || 0) + 1), name = `kbC${c}`;
  const s = document.createElement('style');
  s.textContent = `@keyframes ${name}{from{transform:${fromCss}}to{transform:${toCss}}}`;
  document.head.appendChild(s);
  kbEl.style.transformOrigin = '50% 50%';
  kbEl.style.animation = `${name} ${dur}s linear forwards`;
}

function stop() {
  stage.querySelectorAll('.play-layer').forEach(l => l.remove());
  clearFadeOverlay();
  idle.style.display = 'flex';
  connDot.classList.remove('live');
}

function clearFadeOverlay() {
  clearTimeout(fadeTimer);
  fadeOverlay.style.transition = 'none';
  fadeOverlay.style.opacity = '0';
}

function doFadeIn(dur) {
  fadeOverlay.style.transition = 'none';
  fadeOverlay.style.opacity = '1';
  requestAnimationFrame(() => requestAnimationFrame(() => {
    fadeOverlay.style.transition = `opacity ${dur}s ease`;
    fadeOverlay.style.opacity = '0';
  }));
}

function doFadeOut(dur, partial) {
  fadeOverlay.style.transition = `opacity ${dur}s ease`;
  fadeOverlay.style.opacity = '1';
  if (!partial) {
    fadeTimer = setTimeout(() => {
      stage.querySelectorAll('.play-layer').forEach(l => l.remove());
      idle.style.display = 'flex';
      fadeOverlay.style.transition = 'none';
      fadeOverlay.style.opacity = '0';
    }, dur * 1000 + 100);
  }
}

function renderFrame(d) {
  idle.style.display = 'none';
  if (d.fadeIn > 0) doFadeIn(d.fadeIn); else clearFadeOverlay();

  const tdMs = d.transDuration * 1000;
  const newLayer = document.createElement('div');
  newLayer.classList.add('play-layer');
  newLayer.style.zIndex = '10';
  newLayer.innerHTML = buildHTML(d);

  const old = stage.querySelectorAll('.play-layer');
  if (old.length > 0 && d.transitionType !== 'cut') {
    old.forEach(l => {
      l.style.zIndex = '9';
      l.style.setProperty('--td', d.transDuration + 's');
      if (d.transitionType === 'fade') l.classList.add('trans-fade-out');
      else if (d.transitionType === 'czoom') l.classList.add('trans-czoom-out');
      else if (d.transitionType === 'dip') l.classList.add('trans-dip-out');
      setTimeout(() => l.remove(), tdMs + 200);
    });
    newLayer.style.setProperty('--td', d.transDuration + 's');
    if (d.transitionType === 'fade') newLayer.classList.add('trans-fade-in');
    else if (d.transitionType === 'wipe') newLayer.classList.add('trans-wipe-in');
    else if (d.transitionType === 'czoom') newLayer.classList.add('trans-czoom-in');
    else if (d.transitionType === 'dip') newLayer.classList.add('trans-dip-in');
  } else {
    old.forEach(l => l.remove());
  }
  stage.appendChild(newLayer);

  const kbEl = newLayer.querySelector('.kb-layer');
  if (kbEl) {
    if (d.kbAnim === 'custom') {
      kbEl.style.setProperty('--ks', '1');
      if (d.kbStartCx != null && d.kbStartCy != null && d.kbStartZ != null && d.kbEndCx != null && d.kbEndCy != null && d.kbEndZ != null) {
        applyCustomKBFromXYZ(kbEl, d.kbStartCx, d.kbStartCy, d.kbStartZ, d.kbEndCx, d.kbEndCy, d.kbEndZ, d.kbDur, d.kbScale);
      } else if (d.kbCustomStart && d.kbCustomEnd) {
        applyCustomKB(kbEl, d.kbCustomStart, d.kbCustomEnd, d.kbDur, d.kbScale);
      }
    } else {
      const am = {'zoom-in':'kb-zi','zoom-out':'kb-zo','pan-right':'kb-pr','pan-left':'kb-pl','drift':'kb-dr'};
      kbEl.style.setProperty('--ks', d.kbScale);
      kbEl.style.animation = (am[d.kbAnim] || 'kb-zi') + ' ' + d.kbDur + 's linear forwards';
    }
  }

  const cs = d.captionStyle || {};
  if (d.captionOn && d.mode === 'split') {
    const splitTag = newLayer.querySelector('.split-tag');
    const splitTitle = newLayer.querySelector('.split-text h2');
    const splitSub = newLayer.querySelector('.split-text p');
    if (splitTag)  splitTag.style.color = cs.accentColor || '#d4ff47';
    if (splitTitle) splitTitle.style.color = cs.textColor || '#ffffff';
    if (splitSub)   splitSub.style.color = cs.textColor || '#ffffff';
  }
  if (d.captionOn && d.mode !== 'split') {
    const lt = newLayer.querySelector('.lower-third');
    if (lt) {
      const bg = cs.bgColor ? hexToRgba(cs.bgColor, (cs.bgOpacity || 75) / 100) : 'rgba(0,0,0,0.8)';
      lt.style.background = 'linear-gradient(transparent, ' + bg + ')';
      const tagEl = lt.querySelector('.lt-tag');
      const titleEl = lt.querySelector('.lt-title');
      const subEl = lt.querySelector('.lt-sub');
      if (tagEl)   tagEl.style.color = cs.accentColor || '#d4ff47';
      if (titleEl) titleEl.style.color = cs.textColor || '#ffffff';
      if (subEl)   subEl.style.color = cs.textColor || '#ffffff';
      setTimeout(function () { lt.classList.add('vis'); }, 1200);
    }
  }

  cancelAnimationFrame(progRAF);
  const pf = newLayer.querySelector('.prog-fill');
  if (pf) {
    const start = Date.now(), dur = d.holdDuration * 1000;
    (function tick() {
      const pct = Math.min((Date.now()-start)/dur*100,100);
      pf.style.width = pct+'%';
      if (pct < 100) progRAF = requestAnimationFrame(tick);
    })();
  }

  if (d.eoc === 'fade' && d.fadeOut > 0) {
    const delay = Math.max(0, d.holdDuration * 1000 - d.fadeOut * 1000);
    fadeTimer = setTimeout(() => doFadeOut(d.fadeOut, false), delay);
  } else if (d.eoc === 'clear') {
    fadeTimer = setTimeout(() => stop(), d.holdDuration * 1000);
  }
}

function buildHTML(d) {
  const cs = d.captionStyle || {};
  let h = '';
  if (d.mode === 'fullscreen') {
    h = `<div class="kb-layer"><img class="fill" src="${d.src}"></div><div class="vignette"></div>`;
  } else if (d.mode === 'blurbg') {
    h = `<div class="kb-layer"><div class="blur-bg" style="background-image:url(${d.src})"></div><div class="blur-fg"><img src="${d.src}"></div></div>`;
  } else if (d.mode === 'split') {
    const so = d.modeOpts || {};
    const objFit = so.objectFit || 'cover';
    if (!d.captionOn) {
      h = `<div class="kb-layer"><div class="split-bg-layer" style="background-image:url(${d.src})"></div><div class="split-content split-content--full"><div class="split-img-wrap split-img-wrap--full"><img src="${d.src}" style="object-fit:${objFit}"></div></div></div>`;
    } else {
      const photoSide = so.splitImageSide || 'left';
      const textAlign = so.splitTextAlign || 'left';
      const isCenter = photoSide === 'center';
      const centerW = so.splitCenterWidth != null ? so.splitCenterWidth : 40;
      const centerH = so.splitCenterHeight != null ? so.splitCenterHeight : 45;
      const splitW = isCenter ? '' : `style="width:${(so.splitImgWidth != null ? so.splitImgWidth : 55)}%"`;
      const contentClass = 'split-content' + (photoSide === 'right' ? ' split-content--photo-right' : '') + (isCenter ? ' split-content--photo-center' : '');
      const imgWrapStyle = isCenter ? ' style="width:' + centerW + '%;height:' + centerH + '%"' : '';
      const imgWrapClass = isCenter ? ' split-img-wrap--center' : '';
      const tagHtml = (d.captionTag ? `<div class="split-tag">${d.captionTag}</div>` : '');
      const hasTag = !!d.captionTag;
      const hasSub = !!(d.captionSub || d.subject);
      const lineCount = 1 + (hasTag ? 1 : 0) + (hasSub ? 1 : 0);
      const centerLinesClass = isCenter ? ' split-text--center-lines-' + lineCount : '';
      const textBlock = `<div class="split-text split-text--h-${textAlign}${centerLinesClass}"><div class="split-text-inner">${tagHtml}<h2>${d.captionTitle || ''}</h2><p>${d.captionSub || d.subject || ''}</p></div></div>`;
      const contentStyle = isCenter ? ' style="--split-center-img-h:' + centerH + '%"' : '';
      const imgWrap = isCenter ? '<div class="split-img-wrap' + imgWrapClass + '"' + imgWrapStyle + '><img src="' + d.src + '" style="object-fit:' + objFit + '"></div>' : '<div class="split-img-wrap" ' + splitW + '><img src="' + d.src + '" style="object-fit:' + objFit + '"></div>';
      h = `<div class="kb-layer"><div class="split-bg-layer" style="background-image:url(${d.src})"></div><div class="${contentClass}"${contentStyle}>${imgWrap}${textBlock}</div></div>`;
    }
  }
  if (d.captionOn && d.mode !== 'split') {
    const pos = cs.position || 'bottom';
    const justify = cs.justify || 'left';
    h += `<div class="lower-third pos-${pos} lt-justify-${justify}">
      <div class="lower-third-inner">
        <div class="lt-tag">${d.captionTag || ''}</div>
        <div class="lt-title">${d.captionTitle || ''}</div>
        ${d.captionSub ? `<div class="lt-sub">${d.captionSub}</div>` : ''}
      </div>
    </div>`;
  }
  h += '<div class="prog-bar"><div class="prog-fill"></div></div>';
  return h;
}
</script>
</body>
</html>
